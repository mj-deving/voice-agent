  <line x1="240" y1="856" x2="100" y2="856" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <rect x="87" y="845" width="157" height="15" rx="3" fill="#0f0f1a" opacity="0.92"/>
