  <rect x="465" y="858" width="18" height="10" rx="2" fill="#ef4444"/>
  <text x="487" y="868" font-size="11" fill="#94a3b8">emergency path</text>
  <rect x="605" y="858" width="18" height="10" rx="2" fill="#f97316"/>
  <text x="627" y="868" font-size="11" fill="#94a3b8">call transfer</text>
  <rect x="738" y="858" width="18" height="10" rx="2" fill="#a855f7"/>
  <text x="760" y="868" font-size="11" fill="#94a3b8">notifications</text>
