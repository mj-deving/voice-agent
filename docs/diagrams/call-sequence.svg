  <line x1="150" y1="334" x2="850" y2="334" stroke="#334155" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="152" y="325" width="100" height="14" rx="2" fill="#0f0f1a" opacity="0.9"/>
  <text x="202" y="336" text-anchor="middle" font-size="10" fill="#94a3b8">slot available?</text>
